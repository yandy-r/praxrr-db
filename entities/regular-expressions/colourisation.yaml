name: Colourisation
pattern: \bcolou?r(i[sz]ed?|ed)?\b
tags:
  - Colour Grade
  - Enhancement
description: |-
  Colourisation (or colorization in American English) is the process of adding colour to black-and-white, sepia, or other monochrome images. Matches variations of `color` in both American and British spellings, including:

  - **Base forms:** `color`, `colour`
  - **Past tense/adjective forms:** `colored`, `coloured`
  - **Verb forms:** `colorize`, `colourize`, `colorise`, `colourise`
  - **Past participles:** `colorized`, `coloured`, `colourized`, `colourised`
