migration:
  format: yaml
  version: 1
  source: pcd-export
name: BCORE
description: Matches 'Bravia Core' WEB-DLs
includeInRename: true
tags:
  - Streaming Service
  - WEB-DL
conditions:
  - name: BCORE Regex
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: Bravia Core
        pattern: \b(?:BCORE|(?:CORE)(?=\s*.(?:WEB-?DL|WEBRIP)))\b
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - web_dl
  - name: WEBRip
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - webrip
tests: []
