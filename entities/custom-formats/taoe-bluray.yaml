migration:
  format: yaml
  version: 1
  source: pcd-export
name: TAoE Bluray
description: Matches 1080p TAoE Blurays via Release Title Parsing
includeInRename: false
tags: []
conditions:
  - name: 1080p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 1080p
  - name: Bluray
    type: source
    arrType: all
    negate: false
    required: true
    sources:
      - bluray
  - name: Release Group
    type: release_group
    arrType: all
    negate: true
    required: true
    patterns:
      - name: TAoE
        pattern: (?<=^|[\s.-])(TAoE|Ainz|AJJMIN|ANONAZ|ArcX|bccornfo|DNU|DrainedDay|DUHIT|Erie|Frys|Goki|HxD|jb2049|JBENT|Nostradamus|r0b0t|Species180|TheSickle|xtrem3x|WEM)\b
  - name: TAoE
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: TAoE (Title)
        pattern: TAoE
tests: []
