migration:
  format: yaml
  version: 1
  source: pcd-export
name: 1080p Compact Movie WEB Tier 3
description: Matches release groups who fall under 1080p Compact Movie WEB Tier 3
includeInRename: false
tags:
  - 1080p
  - Compact
  - Movie
  - Release Group Tier
conditions:
  - name: 1080p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 1080p
  - name: R1GY3B
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: R1GY3B
        pattern: (?<=^|[\s.-])R1GY3B\b
  - name: ToNaTo
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: ToNaTo
        pattern: (?<=^|[\s.-])ToNaTo\b
  - name: Vyndros
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: Vyndros
        pattern: (?<=^|[\s.-])Vyndros\b
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - web_dl
  - name: WEBRip
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - webrip
  - name: edge2020
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: edge2020
        pattern: (?<=^|[\s.-])edge2020\b
  - name: x265
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: x265 (Efficient)
        pattern: ^(?!.*(?i:remux))(?=.*([xh]\s?(\.?265)\b|HEVC|\bDS4K\b)).*$
tests: []
