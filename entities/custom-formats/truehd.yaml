migration:
  format: yaml
  version: 1
  source: pcd-export
name: TrueHD
description: Matches 'TrueHD' Regex Pattern and negates any other audio types that might conflict.
includeInRename: false
tags:
  - Audio
conditions:
  - name: Not DTS
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: DTS
        pattern: \bDTS(\b|\d)
  - name: Not Dolby Digital
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Dolby Digital
        pattern: \bDD[^a-z+]|(?<!e)ac3
  - name: Not Dolby Digital +
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Dolby Digital +
        pattern: \bDD[P+]|\b(e[-_. ]?ac3)\b
  - name: Not FLAC
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: FLAC
        pattern: \bFLAC(\b|\d)
  - name: TrueHD
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: TrueHD
        pattern: True[ .-]?HD[ .-]?
tests: []
