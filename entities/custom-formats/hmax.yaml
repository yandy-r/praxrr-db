migration:
  format: yaml
  version: 1
  source: pcd-export
name: HMAX
description: Matches 'HBO Max' WEB-DLs
includeInRename: true
tags:
  - Streaming Service
  - WEB-DL
conditions:
  - name: HMAX Regex
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: HBO Max
        pattern: \b(?:HMAX|HBOM|(?:HBO[ ._-]?MAX)(?=\s*.(?:WEB-?DL|WEBRIP)))\b
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - web_dl
  - name: WEBRip
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - webrip
tests: []
