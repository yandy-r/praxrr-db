migration:
  format: yaml
  version: 1
  source: pcd-export
name: HBO Max Enhancement
description: Augments the Streaming Service Score for 1080p Releases and below for 2160p Profiles
includeInRename: false
tags:
  - Enhancement
conditions:
  - name: HMAX
    type: release_title
    arrType: all
    negate: false
    required: false
    patterns:
      - name: HBO Max
        pattern: \b(?:HMAX|HBOM|(?:HBO[ ._-]?MAX)(?=\s*.(?:WEB-?DL|WEBRIP)))\b
  - name: MAX
    type: release_title
    arrType: all
    negate: false
    required: false
    patterns:
      - name: Max
        pattern: \b((?<!hbo[ ._-])max)\b(?=[ ._-]web[ ._-]?(dl|rip)\b)
  - name: Not 2160p
    type: resolution
    arrType: all
    negate: true
    required: true
    resolutions:
      - 2160p
tests: []
