migration:
  format: yaml
  version: 1
  source: pcd-export
name: 1080p HDTV Tier 3
description: Matches release groups who fall under 1080p HDTV Tier 3
includeInRename: false
tags:
  - Release Group Tier
conditions:
  - name: 1080p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 1080p
  - name: HANDJOB
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: HANDJOB
        pattern: (?<=^|[\s.-])HANDJOB\b
  - name: HDTV
    type: source
    arrType: all
    negate: false
    required: true
    sources:
      - television
  - name: HDTV Regex
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: HDTV
        pattern: \b(HDTV)\b
tests: []
