migration:
  format: yaml
  version: 1
  source: pcd-export
name: DVD Quality Tier 2
description: Matches release groups who fall under DVD GPPi Tier 2
includeInRename: false
tags:
  - DVD
  - GPPi
  - Quality
  - Release Group Tier
conditions:
  - name: DVD
    type: source
    arrType: all
    negate: false
    required: true
    sources:
      - dvd
  - name: HANDJOB
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: HANDJOB
        pattern: (?<=^|[\s.-])HANDJOB\b
tests: []
