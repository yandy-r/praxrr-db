migration:
  format: yaml
  version: 1
  source: pcd-export
name: Better Theatricals
description: |-
  Matches movies where the `Theatrical` cut is considered the better version. Subjectively chosen, based on Praxrr's personal preferences and major opinion. Needed to override the default special edition preference. Matches:
  - Terminator 2: Judgement Day (1991)
  - Alien (1979)
  - Star Wars OT (1977-1983)
  - Apocalypse Now (1979)
  - The Exorcist (1973)
  - Donnie Darko (2001)
  - Amadeus (1984)
  - Payback (1999)
  - Almost Famous (2000)
includeInRename: false
tags:
  - Edition
conditions:
  - name: Better Theatricals
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: Better Theatricals
        pattern: ^\b(terminator.?2|alien[^s].*?1979|star.wars.*?(4k|19)(77)|.*?\bempire.strikes.back|.*?\breturn.of.the.jedi|apocalypse.now|the.exorcist.*?1973|donnie.darko|amadeus|payback.*?1999|payback.straight.up.*?2006|almost.famous)\b
  - name: Not Extended Clip
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Extended Clip
        pattern: \b(extended.?clip)\b
  - name: Not IMAX
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: IMAX
        pattern: \b((?<!NON.?)IMAX)\b
  - name: Not Open Matte
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Open Matte
        pattern: \b(open.?matte)\b
  - name: Not Sing Along
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Sing Along
        pattern: (?<=\b[12]\d{3}\b).*\b(Sing[-_. ]Along)\b
  - name: Not Special Edition
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Special Edition
        pattern: (?<=\b[12]\d{3}\b).*\b(Cut|Directors|DC|Edition|Extended|Special|Uncensored|Uncut|Unrated|Version)(\b|\d)
  - name: Theatrical
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: Theatrical Edition
        pattern: ^(.*?)(\d{4})(.*?)\b(theatrical)\b
tests: []
