migration:
  format: yaml
  version: 1
  source: pcd-export
name: B&W
description: Matches the 'B&W' and 'Colour' Regex Pattern
includeInRename: false
tags:
  - Banned
  - Colour Grade
  - Enhancement
conditions:
  - name: B&W
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: B&W
        pattern: \d{4}.*?\bblack\b[\s.]*(?:and|\&|-|\/)?[\s.]*\bwhite\b|\bb\&?w\b
  - name: Not Colour
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Colourisation
        pattern: \bcolou?r(i[sz]ed?|ed)?\b
tests: []
