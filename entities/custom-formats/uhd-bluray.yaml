migration:
  format: yaml
  version: 1
  source: pcd-export
name: UHD Bluray
description: UHD Blu-ray is a digital optical disc format released in 2016. It stores 66GB on triple-layer discs or 100GB on quad-layer discs, compared to standard Blu-ray's 25GB/50GB capacity. The format delivers 3840x2160 (4K) resolution video using HEVC (H.265) encoding at bitrates up to 128Mbps. All UHD Blu-rays include HDR10 support, with some releases adding Dolby Vision or HDR10+. The format uses the BT.2020 color space and 10-bit color depth, while supporting audio formats like Dolby Atmos, DTS:X, DTS-HD MA, and Dolby TrueHD. UHD Blu-ray players require HDMI 2.0a and HDCP 2.2 compliant displays to show 4K HDR content.
includeInRename: false
tags:
  - 2160p
  - Storage
conditions:
  - name: 1080p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 1080p
  - name: HDR
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: Basic HDR Formats
        pattern: (?:(?<=^(?!.*\b(HLG|PQ|SDR)(\b|\d)).*?)HDR)|\b(dv(?![ .](HLG|SDR))|dovi|dolby[ .]?vision)\b
  - name: Release Groups
    type: release_group
    arrType: all
    negate: false
    required: true
    patterns:
      - name: UHD Bluray Release Groups
        pattern: (?<=^|[\s.-])(AJP69|ATELiER|BMF|BRUTE|BSTD|BV|c0kE|Chotab|CJ|coffee|CRiSC|CRX|CtrlHD|Dariush|de[42]|decibel|DON|D-Z0N3|E.N.D|E1|EA|EDPH|EbP|ESiR|EXCiSION|FoRM|FraMeSToR|GALAXY|Geek|GS88|hdalx|HDMaNiAcS|HiDt|HiFi|HiP|IDE|iFT|KASHMiR|Kitsune|LiNG|LolHD|LoRD|luvBB|NCmt|NiBuRu|nmd|NTb|NyHD|ORiGEN|Penumbra|playHD|Positive|PTer|PuTao|REBORN|RiCO|rightSIZE|RO|rttr|SA89|SaNcTi|SbR|SiMPLE|SoLaR|SOP|SPHD|TayTo|TBB|TDD|TeamSyndicate|TnP|VLAD|VietHD|W4NK3R|WiLF|WMING|xander|ZIMBO|ZoroSenpai|ZQ)\b
  - name: UHD Bluray
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: UHD Bluray
        pattern: \bUHD[-_.\s]?Blu[-]?Ray\b
tests: []
