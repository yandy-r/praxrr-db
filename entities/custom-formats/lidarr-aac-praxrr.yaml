migration:
  format: yaml
  version: 1
  source: pcd-export
name: Lidarr - AAC (Praxrr)
description: Matches AAC lossy audio codec for Lidarr.
includeInRename: false
tags:
  - Audio
conditions:
  - name: AAC
    type: release_title
    arrType: lidarr
    negate: false
    required: true
    patterns:
      - name: AAC
        pattern: \bAAC(\b|\d)
  - name: Not FLAC
    type: release_title
    arrType: lidarr
    negate: true
    required: true
    patterns:
      - name: FLAC
        pattern: \bFLAC(\b|\d)
tests: []
