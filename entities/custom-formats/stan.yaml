migration:
  format: yaml
  version: 1
  source: pcd-export
name: STAN
description: Matches 'STAN' WEB-DLs
includeInRename: true
tags:
  - Streaming Service
  - WEB-DL
conditions:
  - name: STAN Regex
    type: release_title
    arrType: all
    negate: false
    required: false
    patterns:
      - name: Stan
        pattern: \b(stan)\b[ ._-]web[ ._-]?(dl|rip)?\b
  - name: STAN Rename Regex
    type: release_title
    arrType: all
    negate: false
    required: false
    patterns:
      - name: Stan Rename
        pattern: \[(STAN)\b|\b(STAN)\]
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - web_dl
  - name: WEBRip
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - webrip
tests: []
