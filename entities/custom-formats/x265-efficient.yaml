migration:
  format: yaml
  version: 1
  source: pcd-export
name: x265 (Efficient)
description: Matches x/h265 Releases when not 2160p or 1080p
includeInRename: false
tags:
  - Codec
conditions:
  - name: Not 1080p
    type: resolution
    arrType: all
    negate: true
    required: true
    resolutions:
      - 1080p
  - name: Not 2160p
    type: resolution
    arrType: all
    negate: true
    required: true
    resolutions:
      - 2160p
  - name: x265
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: x265
        pattern: ^(?!.*(?i:remux))(?=.*([x]\s?(\.?265)\b|HEVC|\bDS4K\b)).*$
tests: []
