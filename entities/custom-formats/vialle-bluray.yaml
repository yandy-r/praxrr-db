migration:
  format: yaml
  version: 1
  source: pcd-export
name: Vialle Bluray
description: Matches 1080p Vialle Blurays via Release Title Parsing
includeInRename: false
tags: []
conditions:
  - name: 1080p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 1080p
  - name: Bluray
    type: source
    arrType: all
    negate: false
    required: true
    sources:
      - bluray
  - name: Release Group
    type: release_group
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Vialle
        pattern: (?<=^|[\s.-])Vialle\b
  - name: Vialle
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: Vialle
        pattern: (?<=^|[\s.-])Vialle\b
tests: []
