migration:
  format: yaml
  version: 1
  source: pcd-export
name: CR
description: Matches 'Crunchyroll' WEB-DLs.
includeInRename: true
tags:
  - Streaming Service
  - WEB-DL
conditions:
  - name: CR Regex
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: Crunchyroll
        pattern: \b(C(runchy)?[ .-]?R(oll)?)\b
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - web_dl
  - name: WEBRip
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - webrip
tests: []
