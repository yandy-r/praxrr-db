migration:
  format: yaml
  version: 1
  source: pcd-export
name: Movies Anywhere Enhancement
description: Augments the Streaming Service Score for 1080p Releases and below for 2160p Profiles
includeInRename: false
tags:
  - Enhancement
conditions:
  - name: MA
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: Movies Anywhere
        pattern: \b(?<!dts[ .-]?hd[ .-]?)ma\b(?=.*\bweb[ ._-]?(dl|rip)\b)
  - name: Not 2160p
    type: resolution
    arrType: all
    negate: true
    required: true
    resolutions:
      - 2160p
tests: []
