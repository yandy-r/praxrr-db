migration:
  format: yaml
  version: 1
  source: pcd-export
name: 1080p Efficient TV WEB Tier 3
description: Matches release groups who fall under 1080p Efficient TV WEB Tier 3
includeInRename: false
tags:
  - 1080p
  - Efficient
  - Release Group Tier
  - TV
conditions:
  - name: 1080p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 1080p
  - name: Grimm
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: GRiMM
        pattern: (?<=^|[\s.-])GRiMM\b
  - name: OnlyWeb
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: OnlyWeb
        pattern: (?<=^|[\s.-])OnlyWeb\b
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - web_dl
  - name: WEBRip
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - webrip
  - name: YELLO
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: YELLO
        pattern: (?<=^|[\s.-])YELLO\b
  - name: edge2020
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: edge2020
        pattern: (?<=^|[\s.-])edge2020\b
  - name: x265
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: x265 (Efficient)
        pattern: ^(?!.*(?i:remux))(?=.*([xh]\s?(\.?265)\b|HEVC|\bDS4K\b)).*$
tests: []
