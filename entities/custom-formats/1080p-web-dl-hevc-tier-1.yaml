  - name: h265
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: HEVC
        pattern: '[xh][ ._-]?265|\bHEVC(\b|\d)'
  - name: playWEB
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: playWEB
        pattern: (?<=^|[\s.-])playWEB\b
tests: []
