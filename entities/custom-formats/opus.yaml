migration:
  format: yaml
  version: 1
  source: pcd-export
name: Opus
description: Matches 'Opus' Regex Pattern and negates any other audio types that might conflict.
includeInRename: false
tags:
  - Audio
conditions:
  - name: Not OPUS Release Group
    type: release_group
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Opus (Negation)
        pattern: (?<=^|[\s.-])OPUS\b
  - name: Opus
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: Opus
        pattern: \bOPUS(\b|\d)(?!.*[ ._-](\d{3,4}p))
tests: []
