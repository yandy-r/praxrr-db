migration:
  format: yaml
  version: 1
  source: pcd-export
name: 1080p Bluray HEVC Tier 1
description: Matches release groups who fall under 1080p Efficient Bluray Tier 1
includeInRename: false
tags:
  - 1080p
  - HEVC
  - Movie
  - Release Group Tier
  - TV
conditions:
  - name: 1080p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 1080p
  - name: Bluray
    type: source
    arrType: all
    negate: false
    required: true
    sources:
      - bluray
  - name: HONE
    type: release_group
    arrType: all
    negate: false
    required: true
    patterns:
      - name: HONE
        pattern: (?<=^|[\s.-])HONE\b
  - name: x265
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: x265 (Efficient)
        pattern: ^(?!.*(?i:remux))(?=.*([xh]\s?(\.?265)\b|HEVC|\bDS4K\b)).*$
tests: []
