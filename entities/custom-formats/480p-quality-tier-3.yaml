migration:
  format: yaml
  version: 1
  source: pcd-export
name: 480p Quality Tier 3
description: Matches release groups who fall under 480p Quality Tier 3
includeInRename: false
tags:
  - 480p
  - GPPi
  - Quality
  - Release Group Tier
conditions:
  - name: 480p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 480p
  - name: Bluray
    type: source
    arrType: all
    negate: false
    required: true
    sources:
      - bluray
  - name: EDPH
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: EDPH
        pattern: (?<=^|[\s.-])EDPH\b
  - name: GS88
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: GS88
        pattern: (?<=^|[\s.-])GS88\b
  - name: KnG
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: KnG
        pattern: (?<=^|[\s.-])KnG\b
  - name: Not Remux
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Remux
        pattern: Remux
  - name: PTer
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: PTer
        pattern: (?<=^|[\s.-])PTer\b
  - name: playSD
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: playSD
        pattern: (?<=^|[\s.-])playSD\b
  - name: rttr
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: rttr
        pattern: (?<=^|[\s.-])rttr\b
tests: []
