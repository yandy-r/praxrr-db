migration:
  format: yaml
  version: 1
  source: pcd-export
name: PCOK
description: Matches 'Peacock' WEB-DLs
includeInRename: true
tags:
  - Streaming Service
  - WEB-DL
conditions:
  - name: PCOK Regex
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: Peacock TV
        pattern: \b(?:PCOK|(?:Peacock)(?=\s*.(?:WEB-?DL|WEBRIP)))\b
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - web_dl
  - name: WEBRip
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - webrip
tests: []
