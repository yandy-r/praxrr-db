migration:
  format: yaml
  version: 1
  source: pcd-export
name: 720p HDTV
description: Matches 720p HDTV.
includeInRename: false
tags:
  - Source
conditions:
  - name: 720p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 720p
  - name: HDTV
    type: source
    arrType: all
    negate: false
    required: true
    sources:
      - television
  - name: HDTV Regex
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: HDTV
        pattern: \b(HDTV)\b
tests: []
