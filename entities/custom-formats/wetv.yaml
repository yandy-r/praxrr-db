migration:
  format: yaml
  version: 1
  source: pcd-export
name: WeTV
description: Matches 'WeTV' WEB-DLs
includeInRename: true
tags:
  - Streaming Service
  - WEB-DL
conditions:
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - web_dl
  - name: WEBRip
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - webrip
  - name: WeTV Regex
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: WeTV
        pattern: \b(WeTV)\b
tests: []
