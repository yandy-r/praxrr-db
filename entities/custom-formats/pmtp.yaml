migration:
  format: yaml
  version: 1
  source: pcd-export
name: PMTP
description: Matches 'Paramount+' WEB-DLs
includeInRename: true
tags:
  - Streaming Service
  - WEB-DL
conditions:
  - name: PMTP Regex
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: Paramount+
        pattern: \b(PMTP|Paramount Plus)\b
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - web_dl
  - name: WEBRip
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - webrip
tests: []
