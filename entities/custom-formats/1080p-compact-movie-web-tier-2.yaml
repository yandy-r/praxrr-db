migration:
  format: yaml
  version: 1
  source: pcd-export
name: 1080p Compact Movie WEB Tier 2
description: Matches release groups who fall under 1080p Compact Movie WEB Tier 2
includeInRename: false
tags:
  - 1080p
  - Compact
  - Movie
  - Release Group Tier
conditions:
  - name: 1080p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 1080p
  - name: DarQ
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: DarQ
        pattern: (?<=^|[\s.-])DarQ\b
  - name: LSt
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: LSt
        pattern: (?<=^|[\s.-])LSt\b
  - name: Not HONE
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: HONE
        pattern: (?<=^|[\s.-])HONE\b
  - name: SQS
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: SQS
        pattern: (?<=^|[\s.-])SQS\b
  - name: TimeDistortion
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: TimeDistortion
        pattern: (?<=^|[\s.-])TimeDistortion\b
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - web_dl
  - name: WEBRip
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - webrip
  - name: dkore
    type: release_group
    arrType: all
    negate: false
    required: false
    patterns:
      - name: dkore
        pattern: (?<=^|[\s.-])dkore\b
  - name: x265
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: x265 (Efficient)
        pattern: ^(?!.*(?i:remux))(?=.*([xh]\s?(\.?265)\b|HEVC|\bDS4K\b)).*$
tests: []
