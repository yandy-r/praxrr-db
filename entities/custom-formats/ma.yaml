migration:
  format: yaml
  version: 1
  source: pcd-export
name: MA
description: Matches 'Movies Anywhere' WEB-DLs
includeInRename: true
tags:
  - Streaming Service
  - WEB-DL
conditions:
  - name: MA Regex
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: Movies Anywhere
        pattern: \b(?<!dts[ .-]?hd[ .-]?)ma\b(?=.*\bweb[ ._-]?(dl|rip)\b)
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - web_dl
  - name: WEBRip
    type: source
    arrType: all
    negate: false
    required: false
    sources:
      - webrip
tests: []
