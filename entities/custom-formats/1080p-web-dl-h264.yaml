migration:
  format: yaml
  version: 1
  source: pcd-export
name: 1080p WEB-DL (h264)
description: Matches 1080p H264 WEB-DLs.
includeInRename: false
tags:
  - Source
conditions:
  - name: 1080p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 1080p
  - name: WEB-DL
    type: source
    arrType: all
    negate: false
    required: true
    sources:
      - web_dl
  - name: h264
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: AVC
        pattern: '[xh][ ._-]?264|\bAVC(\b|\d)'
tests: []
