migration:
  format: yaml
  version: 1
  source: pcd-export
name: DTS-HD MA
description: Matches 'DTS-HD MA' Regex Pattern and negates any other audio types that might conflict.
includeInRename: false
tags:
  - Audio
conditions:
  - name: DTS-HD MA
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: DTS-HD MA
        pattern: \b(dts[-_. ]?(ma|hd([-_. ]?ma)?|xll))(\b|\d)
  - name: Not AAC
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: AAC
        pattern: \bAAC(\b|\d)
  - name: Not DTS-HD HRA ES
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: DTS-HD HRA ES
        pattern: dts[-. ]?(es|(hd[. ]?)?(hr|hi))
  - name: Not DTS-X
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: DTS-X
        pattern: \b(dts[-_. :]?x)\b(?!\d)
  - name: Not Dolby Digital
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Dolby Digital
        pattern: \bDD[^a-z+]|(?<!e)ac3
  - name: Not Dolby Digital +
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Dolby Digital +
        pattern: \bDD[P+]|\b(e[-_. ]?ac3)\b
  - name: Not FLAC
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: FLAC
        pattern: \bFLAC(\b|\d)
  - name: Not PCM
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: PCM
        pattern: \b(l?)PCM(\b|\d)
  - name: Not TrueHD
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: TrueHD
        pattern: True[ .-]?HD[ .-]?
tests: []
