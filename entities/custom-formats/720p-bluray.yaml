migration:
  format: yaml
  version: 1
  source: pcd-export
name: 720p Bluray
description: Matches 720p Blurays that are NOT remuxes
includeInRename: false
tags:
  - Source
conditions:
  - name: 720p
    type: resolution
    arrType: all
    negate: false
    required: true
    resolutions:
      - 720p
  - name: Bluray
    type: source
    arrType: all
    negate: false
    required: true
    sources:
      - bluray
  - name: Not Remux
    type: release_title
    arrType: all
    negate: true
    required: true
    patterns:
      - name: Remux
        pattern: Remux
tests: []
