migration:
  format: yaml
  version: 1
  source: pcd-export
name: h265
description: Matches h265 Releases that are not 2160p
includeInRename: false
tags:
  - Codec
conditions:
  - name: Not 2160p
    type: resolution
    arrType: all
    negate: true
    required: true
    resolutions:
      - 2160p
  - name: h265
    type: release_title
    arrType: all
    negate: false
    required: true
    patterns:
      - name: h265
        pattern: (?i)h\s*\.?\s*265
tests: []
